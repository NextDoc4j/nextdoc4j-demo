server:
  port: 9000

# 项目基础配置
project:
  name: NextDoc4j-网关聚合服务-webflux-springboot3
  version: 1.2.0
  description: 专为 SpringDoc 和 OpenAPI 3 设计的现代化文档界面，替代 Swagger UI，提供更美观、更强大的开发体验。让 API 文档焕然一新。这个演示项目展示了 Gateway Server WebFlux 场景下的多服务文档聚合能力。

  contact:
    name: echo
    email: nextdoc4j@163.com
    url: https://nextdoc4j.top/

  license:
    name: Apache License 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

spring:
  application:
    name: gateway-server-sb3

  config:
    import:
      - optional:nacos:${spring.application.name}.yml?group=NEXTDOC4J_SB3&refreshEnabled=true

  cloud:
    nacos:
      # Nacos HTTP 服务端地址
      server-addr: 192.168.10.10:60008
      username: nacos
      password: nacos
      # 配置中心
      config:
        enabled: true
        namespace: public
        group: NEXTDOC4J_SB3
        file-extension: yml
        import-check:
          enabled: false
      # 服务发现
      discovery:
        namespace: public
        group: NEXTDOC4J_SB3
        service: gateway-server-sb3
        naming-load-cache-at-start: true
        failure-tolerance-enabled: true
        fail-fast: false

    gateway:
      server:
        webflux:
          discovery:
            locator:
              lowerCaseServiceId: true
              enabled: true
          routes:
            # 用户服务
            - id: user-service-sb3
              uri: lb://user-service-sb3
              predicates:
                - Path=/user/**,/role/**,/auth/**
              filters:
                - StripPrefix=1
              metadata:
                nextdoc4j:
                  name: 用户管理

            - id: system-service-sb3
              uri: lb://system-service-sb3
              predicates:
                - Path=/system/**,/notification/**,/robot/**
              filters:
                - StripPrefix=1
              metadata:
                nextdoc4j:
                  name: 系统管理

            # 文件服务 - 自定义显示名称
            - id: file-service-sb3
              uri: lb://file-service-sb3
              predicates:
                - Path=/file/**
              filters:
                - StripPrefix=1
              metadata:
                nextdoc4j:
                  name: 文件服务


# 日志配置
logging:
  level:
    top.nextdoc4j.demo: DEBUG
    org.springframework.web: debug
    io.swagger.v3: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/nextdoc4j-demo-gateway-sb3.log


nextdoc4j:
  # 是否启用
  enabled: true
  # 生产环境配置
  production: false
  # 认证配置
  auth:
    enabled: false
    password: nextdoc4j2025
  # 扩展配置
  extension:
    # 是否启用
    enabled: true
    # 品牌信息
    brand:
      logo: classpath:/static/favicon.ico
      footer-text: "Copyright © 2025 - [NextDoc4j](https://nextdoc4j.top) All Rights Reserved."

    # markdown 配置 - 用于展示更新日志等文档
    markdown:
      - group: 更新日志
        location: classpath:/markdown/changelog/**
      - group: 项目简介
        location: classpath:/markdown/otherdoc/**
  gateway:
    # 是否自动发现
    auto-discovery: true
    # 服务名解析策略
    name-resolve-strategy: auto  # ROUTE_ID, METADATA, URI, AUTO
    # 文档路径解析策略
    doc-path-strategy: AUTO      # METADATA, ROUTE_PREDICATE, MANUAL_ONLY
    # 全局认证配置
    security:
      globalSchemes:
        Authorization:
          type: HTTP
          in: HEADER
          name: Authorization
          scheme: Bearer
          description: "请输入 Bearer Token，格式：Bearer {token}"
      # 无需认证 接口 支持 ant 风格匹配 /xx/* 和/**/xx
      anonymous:
        - service-id: user-service-sb3
          paths:
            - /api/auth/login
            - /api/user/userAndRole

